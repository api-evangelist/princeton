---
aid: princeton
name: Princeton University
description: >-
  Princeton University is a private Ivy League research university in Princeton,
  New Jersey, ranked #13 in the QS World University Rankings 2025. Its public
  developer footprint is modest and centers on the Princeton University Art
  Museum API, an open, no-authentication REST service for collections data.
  Most institutional APIs (the OIT API Store covering Active Directory,
  PrincetonInfo, and the MobileApp course/dining/places data) are gated behind
  NetID/service-account OAuth2 and campus access. Library and research-data
  systems expose metadata through standard protocols such as OAI-PMH.
